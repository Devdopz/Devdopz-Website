name: Feature request
description: Suggest an improvement or new feature
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea for Devdopz.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What need or pain point does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include screenshots, links, or examples if helpful
